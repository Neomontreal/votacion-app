<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Results</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: #0f172a;
    color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    overflow: hidden;
  }
  .page { display: flex; flex-direction: column; height: 100vh; padding: 22px 30px; }
  .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; flex-shrink: 0; }
  h1 { font-size: 2rem; margin: 0; }
  .total { font-size: 1.1rem; color: #94a3b8; }
  #stage {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    align-content: center;
    justify-content: center;
    gap: 18px;
    min-height: 0;
  }
  .card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    background: #1e293b;
    border: 4px solid transparent;
    flex: 0 0 auto;
  }
  .card.leader {
    border-color: #facc15;
    box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.35), 0 0 40px rgba(250, 204, 21, 0.55);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(250,204,21,0.35), 0 0 30px rgba(250,204,21,0.45); }
    50% { box-shadow: 0 0 0 6px rgba(250,204,21,0.55), 0 0 55px rgba(250,204,21,0.85); }
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .crown {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translate(-50%, -55%);
    font-size: clamp(28px, 6vw, 64px);
    filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.9));
    z-index: 3;
  }
  .overlay {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 10% 8% 8%;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.55) 55%, transparent 100%);
    text-align: center;
  }
  .name {
    font-weight: 800;
    line-height: 1.15;
    font-size: clamp(14px, 2.4vw, 26px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pct {
    font-weight: 900;
    font-size: clamp(20px, 4vw, 44px);
    color: #38bdf8;
    margin-top: 2px;
  }
  .card.leader .pct { color: #facc15; }
  .votes {
    font-size: clamp(11px, 1.6vw, 16px);
    color: #cbd5e1;
  }
  .empty { margin: auto; color: #64748b; font-size: 1.4rem; }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <h1 id="title">Live Results</h1>
    <div class="total" id="total"></div>
  </div>
  <div id="stage"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/display.js"></script>
</body>
</html>
