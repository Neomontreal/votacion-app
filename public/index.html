<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Vote</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
  }
  .container { max-width: 640px; margin: 0 auto; }
  .lang-switch { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .lang-switch button {
    background: #1e293b; color: #94a3b8; border: 1px solid #334155;
    padding: 6px 14px; border-radius: 999px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
  }
  .lang-switch button.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
  h1 { text-align: center; font-size: 1.6rem; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
  .status {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-size: 0.95rem;
  }
  .status.info { background: #1e293b; color: #93c5fd; }
  .status.success { background: #14532d; color: #86efac; }
  .status.error { background: #450a0a; color: #fca5a5; }
  .candidate {
    background: #1e293b;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .candidate img {
    width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: #334155;
  }
  .candidate-info { flex: 1; }
  .candidate-name { font-weight: 600; font-size: 1.05rem; }
  .bar-bg { background: #334155; border-radius: 6px; height: 8px; margin-top: 6px; overflow: hidden; }
  .bar-fill { background: #38bdf8; height: 100%; transition: width 0.4s ease; }
  .votes-count { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; }
  button.vote-btn {
    background: #38bdf8;
    color: #0f172a;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
  }
  button.vote-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
  .total { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.9rem; }

  /* Cookie consent overlay */
  .cookie-overlay {
    position: fixed; inset: 0; background: rgba(15, 23, 42, 0.92);
    display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
  }
  .cookie-box {
    background: #1e293b; border-radius: 16px; padding: 26px; max-width: 420px; text-align: center;
  }
  .cookie-box h2 { margin-top: 0; font-size: 1.15rem; }
  .cookie-box p { color: #cbd5e1; font-size: 0.9rem; line-height: 1.5; }
  .cookie-actions { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
  .cookie-actions button {
    padding: 10px 18px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 0.9rem;
  }
  #cookieAccept { background: #38bdf8; color: #0f172a; }
  #cookieDecline { background: #334155; color: #f1f5f9; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="cookieOverlay" class="cookie-overlay hidden">
  <div class="cookie-box">
    <h2 id="cookieTitle">We use cookies</h2>
    <p id="cookieText">We use a small, essential cookie only to make sure each person can vote once. If you decline, you won't be able to vote.</p>
    <div class="cookie-actions">
      <button id="cookieAccept">Accept &amp; continue</button>
      <button id="cookieDecline">Decline</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="lang-switch">
    <button id="langEn" class="active">EN</button>
    <button id="langFr">FR</button>
  </div>
  <h1 id="title">Live Vote</h1>
  <p class="subtitle" id="subtitle">Results update automatically</p>
  <div id="status" class="status info" style="display:none;"></div>
  <div id="candidates"></div>
  <div class="total" id="total"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/vote.js"></script>
</body>
</html>
